services:
  - type: web
    name: farmmine-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: CWALLET_API_KEY
        sync: false
      - key: CWALLET_MERCHANT_ID
        sync: false
