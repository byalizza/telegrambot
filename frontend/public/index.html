<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FarmMine - Altın Çiftliği</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loader"></div>
        <p>FarmMine'e Hoş Geldiniz...</p>
    </div>

    <div id="app" class="app-container" style="display:none;">
        <header class="header">
            <div class="gold-display">
                <span class="gold-icon">🪙</span>
                <span id="goldBalance">0</span>
            </div>
            <div class="production-display">
                <span id="hourlyProduction">0</span>
                <small>Altın/saat</small>
            </div>
        </header>

        <main id="mainContent" class="main-content">
            <!-- Sayfalar buraya yüklenir -->
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="farm">
                <span class="nav-icon">🌾</span>
                <span class="nav-label">Çiftlik</span>
            </button>
            <button class="nav-btn" data-page="tasks">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Görevler</span>
            </button>
            <button class="nav-btn" data-page="referral">
                <span class="nav-icon">👥</span>
                <span class="nav-label">Ortaklık</span>
            </button>
            <button class="nav-btn" data-page="wallet">
                <span class="nav-icon">👛</span>
                <span class="nav-label">Cüzdan</span>
            </button>
            <button class="nav-btn" data-page="faq">
                <span class="nav-icon">❓</span>
                <span class="nav-label">Nasıl?</span>
            </button>
        </nav>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/api.js"></script>
    <script src="js/components/farm.js"></script>
    <script src="js/components/tasks.js"></script>
    <script src="js/components/referral.js"></script>
    <script src="js/components/wallet.js"></script>
    <script src="js/components/social.js"></script>
    <script src="js/components/faq.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
